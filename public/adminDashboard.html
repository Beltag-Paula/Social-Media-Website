<!DOCTYPE html>
<html>

<head>
    <title>Admin Dashboard</title>
</head>

<script src="js/search.js"></script>


<body>
    <nav>
        <a href="home.html">Home Feed</a> |
        <a href="profile.html">My Profile</a> |

        <input type="text" id="globalSearchInput" placeholder="Search users...">
        <button onclick="executeGlobalSearch()">Search</button>
        <div id="globalSearchResults"></div>

        <button id="logoutButton">Log out</button>
    </nav>
    <h1>Admin Dashboard</h1>

    <div>
        <h3>Pending Approvals</h3>
        <div id="pendingUsers"></div>
    </div>

    <hr>

    <div>
        <h3>Active Users</h3>
        <div id="activeUsers"></div>
    </div>

    <div>
        <h3>Banned Users</h3>
        <div id="bannedUsers"></div>
    </div>

    <hr>

    <button type="button" id="myProfileButton">Go to profile</button>
    <button type="button" id="logoutButton">Log out</button>

    <script>
        // Containers
        const activeContainer = document.getElementById("activeUsers");
        const bannedContainer = document.getElementById("bannedUsers");
        const pendingContainer = document.getElementById("pendingUsers");

        // Logout Logic
        document.getElementById("logoutButton").addEventListener("click", () => {
            localStorage.removeItem("token");
            window.location.href = "/index.html";
        });

        // Profile Redirect
        document.getElementById("myProfileButton").addEventListener("click", () => {
            const token = localStorage.getItem("token");
            if (!token) {
                window.location.href = "/index.html";
            } else {
                window.location.href = "/profile.html";
            }
        });

        // Reusable Function to Build User Rows
        function renderUser(parent, user) {
            const div = document.createElement("div");
            div.id = `user-${user.id}`;

            const name = document.createElement("p");
            name.innerText = user.username;

            const statusText = document.createElement("p");
            statusText.innerText = `Status: ${user.status}`;

            const reasonText = document.createElement("p");
            reasonText.innerText = user.banReason ? `Ban reason: ${user.banReason}` : "";

            const deleteBtn = document.createElement("button");
            deleteBtn.textContent = "Delete";
            deleteBtn.onclick = () => deleteUser(user.id);

            const statusSelect = document.createElement("select");
            statusSelect.innerHTML = `
        <option value="" disabled selected>Change Status</option>
        <option value="1">Active</option>
        <option value="2">Banned</option>
        <option value="0">Pending</option>
    `;

            statusSelect.onchange = async (e) => {
                const newStatus = e.target.value;

                let banReason = null;

                // ask reason ONLY if banning
                if (newStatus == "2") {
                    banReason = prompt("Enter ban reason:");
                }

                await updateStatus(user.id, newStatus, banReason);
            };

            div.appendChild(name);
            div.appendChild(statusText);
            div.appendChild(reasonText);
            div.appendChild(statusSelect);
            div.appendChild(deleteBtn);

            parent.appendChild(div);
        }

        // Fetching Data
        async function loadSection(endpoint, container) {
            try {
                const response = await fetch(`/api/v1/admin/users/${endpoint}`, {
                    headers: {
                        "Authorization": `Bearer ${localStorage.getItem("token")}`
                    }
                });
                const data = await response.json();

                container.innerHTML = "";

                if (data.rows && Array.isArray(data.rows)) {
                    data.rows.forEach(user => renderUser(container, user));
                }
            } catch (err) {
                console.error("Error loading " + endpoint, err);
            }
        }

        // Action: Delete
        async function deleteUser(id) {
            if (!confirm("Delete user?")) return;

            try {
                const res = await fetch("/api/v1/admin/users/delete", {
                    method: "DELETE",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${localStorage.getItem("token")}`
                    },
                    body: JSON.stringify({ id })
                });

                const data = await res.json();

                if (!res.ok) {
                    alert(data.message); // <-- THIS shows backend error message from the backend
                    return;
                }

                alert(data.message); // "User deleted"
                refreshAll();

            } catch (err) {
                console.error(err);
                alert("Network error");
            }
        }

        // Action: Update Status
        async function updateStatus(id, status, banReason = null) {
            const res = await fetch("/api/v1/admin/users/status", {
                method: "PATCH",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": `Bearer ${localStorage.getItem("token")}`
                },
                body: JSON.stringify({ id, status, banReason })
            });

            const data = await res.json();

            if (!res.ok) {
                alert(data.message);
                return;
            }

            refreshAll();
        }

        function refreshAll() {
            loadSection("active", activeContainer);
            loadSection("pending", pendingContainer);
            loadSection("banned", bannedContainer);
        }

        async function executeGlobalSearch() {
            const q = document.getElementById("globalSearchInput").value;
            const res = await fetch(`/api/v1/search?username=${q}`, {
                headers: { "Authorization": `Bearer ${localStorage.getItem("token")}` }
            });
            const users = await res.json();
            const resultsDiv = document.getElementById("globalSearchResults");
            resultsDiv.innerHTML = "";

            users.forEach(u => {
                const p = document.createElement("p");
                p.innerHTML = `<a href="profile.html?id=${u.id}">${u.username}</a>`;
                resultsDiv.appendChild(p);
            });
        }
        // Initial Run
        refreshAll();
    </script>

</body>

</html>
